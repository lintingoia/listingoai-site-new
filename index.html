<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ListingAI – AI‑Powered Writing</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;

            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        header {
            background-color: #041E42;
            color: #ffffff;
            padding: 60px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

            margin-bottom: 30px;

            padding: 14px 28px;

            background-color: #F6A307;
            color: #041E42;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }
        .cta-button:hover {
            background-color: #e59600;
        }
        section {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        section h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            color: #041E42;
        }
        iframe {
            width: 100%;
            min-height: 500px;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>ListingAI</h1>
        <p>AI‑powered writing engine for high‑converting product titles, tags, descriptions and social posts.</p>
        <a href="#early-access" class="cta-button">Join Early Access</a>
    </header>
    <section id="early-access">
        <h2>Join Early Access</h2>
        <!-- Tally embed: this form will collect emails from interested users -->
        <iframe data-tally-src="https://tally.so/embed/D45v8E?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="623" frameborder="0" marginheight="0" marginwidth="0" title="Join ListingAI Early Access"></iframe>
        <script>
            (function() {
                var d = document;
                var s = d.createElement('script');
                s.src = 'https://tally.so/widgets/embed.js';
                s.onload = function() {
                    if (typeof Tally !== 'undefined') {

                d.body.appendChild(s);
            })();
        </script>
    </section>
</body>
</html>
